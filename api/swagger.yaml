definitions:
  common.KeyValue:
    properties:
      key:
        type: string
      value:
        type: string
    type: object
  handler.UploadResult:
    properties:
      name:
        description: 原始文件名
        type: string
      path:
        description: 存储路径
        type: string
      size:
        description: 文件大小
        type: integer
      url:
        description: 访问URL
        type: string
    type: object
  health.HealthResponse:
    properties:
      services:
        additionalProperties:
          type: string
        description: 服务状态
        type: object
      status:
        description: 状态：healthy, unhealthy
        type: string
      timestamp:
        description: 时间戳
        type: integer
      version:
        description: 版本号
        type: string
    type: object
  model.DeptForm:
    properties:
      code:
        type: string
      id:
        type: integer
      name:
        type: string
      parentId:
        type: integer
      sort:
        type: integer
      status:
        enum:
        - 0
        - 1
        type: integer
    required:
    - code
    - name
    type: object
  model.DictForm:
    properties:
      dictCode:
        type: string
      id:
        type: integer
      name:
        type: string
      remark:
        type: string
      status:
        enum:
        - 0
        - 1
        type: integer
    required:
    - dictCode
    - name
    type: object
  model.DictItemForm:
    properties:
      dictCode:
        type: string
      id:
        type: integer
      label:
        type: string
      remark:
        type: string
      sort:
        type: integer
      status:
        enum:
        - 0
        - 1
        type: integer
      tagType:
        type: string
      value:
        type: string
    required:
    - dictCode
    - label
    - value
    type: object
  model.LoginRequest:
    properties:
      password:
        description: 密码
        example: "123456"
        type: string
      username:
        description: 用户名
        example: admin
        type: string
    required:
    - password
    - username
    type: object
  model.MenuForm:
    properties:
      alwaysShow:
        type: integer
      component:
        type: string
      icon:
        type: string
      id:
        type: integer
      keepAlive:
        type: integer
      name:
        type: string
      params:
        items:
          $ref: '#/definitions/common.KeyValue'
        type: array
      parentId:
        type: integer
      perm:
        type: string
      redirect:
        type: string
      routeName:
        type: string
      routePath:
        type: string
      sort:
        type: integer
      type:
        enum:
        - C
        - M
        - B
        type: string
      visible:
        enum:
        - 0
        - 1
        type: integer
    required:
    - name
    - type
    type: object
  model.RoleForm:
    properties:
      code:
        type: string
      dataScope:
        enum:
        - 1
        - 2
        - 3
        - 4
        - 5
        type: integer
      deptIds:
        items:
          type: integer
        type: array
      id:
        type: integer
      name:
        type: string
      sort:
        type: integer
      status:
        enum:
        - 0
        - 1
        type: integer
    required:
    - code
    - name
    type: object
  model.SmsLoginRequest:
    properties:
      code:
        description: 验证码
        example: "1234"
        type: string
      mobile:
        description: 手机号
        example: "18812345678"
        type: string
    required:
    - code
    - mobile
    type: object
  model.WechatBindMobileRequest:
    properties:
      mobile:
        description: 手机号
        example: "18812345678"
        type: string
      openId:
        description: 微信openid
        example: xxx
        type: string
      smsCode:
        description: 短信验证码
        example: "1234"
        type: string
    required:
    - mobile
    - openId
    - smsCode
    type: object
  model.WechatPhoneLoginRequest:
    properties:
      loginCode:
        description: 微信登录code
        example: xxx
        type: string
      phoneCode:
        description: 微信手机号code
        example: xxx
        type: string
    required:
    - loginCode
    - phoneCode
    type: object
  model.WechatSilentLoginRequest:
    properties:
      code:
        description: 微信登录code
        example: xxx
        type: string
    required:
    - code
    type: object
  response.Result:
    properties:
      code:
        type: string
      data: {}
      msg:
        type: string
    type: object
info:
  contact: {}
paths:
  /api/v1/auth/captcha:
    get:
      description: 获取图形验证码
      produces:
      - application/json
      responses:
        "200":
          description: code/msg/data，data 为 CaptchaVO
          schema:
            additionalProperties: true
            type: object
      summary: 获取验证码
      tags:
      - 01.认证接口
  /api/v1/auth/login:
    post:
      consumes:
      - application/json
      description: 用户名密码登录，返回访问令牌和刷新令牌
      parameters:
      - description: 登录信息
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/model.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: code/msg/data，data 为 AuthenticationToken
          schema:
            additionalProperties: true
            type: object
      summary: 账号密码登录
      tags:
      - 01.认证接口
  /api/v1/auth/login/sms:
    post:
      consumes:
      - application/json
      description: 使用手机号和短信验证码登录
      parameters:
      - description: 短信登录信息
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/model.SmsLoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: code/msg/data，data 为 AuthenticationToken
          schema:
            additionalProperties: true
            type: object
      summary: 短信验证码登录
      tags:
      - 01.认证接口
  /api/v1/auth/logout:
    delete:
      consumes:
      - application/json
      description: 使当前访问令牌失效
      produces:
      - application/json
      responses:
        "200":
          description: code/msg
          schema:
            additionalProperties: true
            type: object
      security:
      - Bearer: []
      summary: 退出登录
      tags:
      - 01.认证接口
  /api/v1/auth/refresh-token:
    post:
      consumes:
      - application/json
      description: 使用刷新令牌获取新的访问令牌
      parameters:
      - description: 刷新令牌信息 {\
        in: body
        name: body
        required: true
        schema:
          additionalProperties:
            type: string
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: code/msg/data，data 为 AuthenticationToken
          schema:
            additionalProperties: true
            type: object
      summary: 刷新令牌
      tags:
      - 01.认证接口
  /api/v1/auth/sms/code:
    post:
      consumes:
      - application/json
      description: 发送短信验证码到指定手机号
      parameters:
      - description: 手机号信息 {\
        in: body
        name: body
        required: true
        schema:
          additionalProperties:
            type: string
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: code/msg
          schema:
            additionalProperties: true
            type: object
      summary: 发送登录短信验证码
      tags:
      - 01.认证接口
