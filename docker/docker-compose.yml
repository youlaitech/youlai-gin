# 有来后台管理系统(Gin) Docker Compose 配置
# 使用方法：在 docker 目录下执行 docker-compose up -d

networks:
  youlai-gin:
    driver: bridge

services:
  # MySQL 数据库
  mysql:
    image: mysql:8.0.29
    container_name: youlai-gin-mysql
    restart: unless-stopped
    environment:
      - TZ=Asia/Shanghai
      - MYSQL_ROOT_PASSWORD=123456
    volumes:
      - ./mysql/data:/var/lib/mysql
      - ../sql/mysql:/docker-entrypoint-initdb.d:ro
    command:
      - --default-authentication-plugin=mysql_native_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_general_ci
      - --explicit_defaults_for_timestamp=true
      - --lower_case_table_names=1
    ports:
      - 3306:3306
    networks:
      - youlai-gin
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis 缓存
  redis:
    image: redis:7.2.3
    container_name: youlai-gin-redis
    restart: unless-stopped
    environment:
      - TZ=Asia/Shanghai
    volumes:
      - ./redis/data:/data
    command: redis-server --requirepass 123456 --appendonly no
    ports:
      - 6379:6379
    networks:
      - youlai-gin
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "123456", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

